name: Release

# Publishes to npm via OIDC Trusted Publishing — no token or secret required.
#
# ONE-TIME setup before this can run (a brand-new package can't be published
# by OIDC first — the package must exist so a trusted publisher can be added):
#   1. Bootstrap the first publish locally:  npm publish --access public
#      (npm will prompt for your 2FA one-time password — no stored token.)
#   2. On npmjs.com → the package → Settings → "Trusted Publisher", add a
#      GitHub Actions publisher:
#        Organization/user: oratis
#        Repository:        commit-gate
#        Workflow filename: release.yml
#
# After that, publishing a GitHub Release (or running this workflow manually)
# publishes token-lessly with build provenance attached.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm to a version with OIDC trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm (OIDC — no token)
        run: npm publish --provenance --access public
